<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祭祀公業廖維禎掃墓系統</title>
    <style>
        :root { --primary-red: #8E2424; --secondary-green: #285430; --bg-color: #F8F5F2; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; border-top: 8px solid var(--primary-red); }
        h2 { text-align: center; color: var(--primary-red); margin-bottom: 5px; font-size: 22px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; border-bottom: 1px solid #EEE; padding-bottom: 15px; }
        
        /* 選單切換 */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #EEE; color: #666; }
        .tab-btn.active { background: var(--primary-red); color: white; }
        .tab-btn.reg-active { background: var(--secondary-green); color: white; }

        /* 表單內容 */
        .page { display: none; }
        .page.active { display: block; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #EEE; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* 按鈕顏色區分 */
        .btn-checkin { width: 100%; padding: 14px; background: var(--primary-red); color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-register { width: 100%; padding: 14px; background: var(--secondary-green); color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; }
        
        .log-section { margin-top: 20px; font-size: 13px; color: #888; background: #F9F9F9; padding: 10px; border-radius: 8px; }
        ul { padding-left: 20px; margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>祭祀公業廖維禎</h2>
    <p class="subtitle">清明祭祖掃墓管理系統</p>

    <div class="tab-container">
        <button id="tab1" class="tab-btn active" onclick="showPage('checkin')">本人簽到</button>
        <button id="tab2" class="tab-btn" onclick="showPage('register')">新成員登記</button>
    </div>

    <div id="checkinPage" class="page active">
        <div class="input-group">
            <label>派下員姓名</label>
            <input type="text" id="name" placeholder="請輸入全名">
        </div>
        <div class="input-group">
            <label>身分證字號</label>
            <input type="password" id="id" placeholder="英文字母需大寫" maxlength="10" oninput="this.value = this.value.toUpperCase()">
        </div>
        <button class="btn-checkin" onclick="handleAction('checkin')">確認驗證並簽到</button>
        <div class="log-section">
            <div id="historyTitle">最近成功簽到紀錄：</div>
            <ul id="recordList"></ul>
        </div>
    </div>

    <div id="registerPage" class="page">
        <p style="font-size: 13px; color: #8E2424; margin-bottom: 15px;">首次參加或名單查無此人時，請在此登記資料。</p>
        <div class="input-group">
            <label>派下員姓名</label>
            <input type="text" id="regName" placeholder="請輸入姓名">
        </div>
        <div class="input-group">
            <label>身分證字號</label>
            <input type="text" id="regID" placeholder="請輸入身分證字號" maxlength="10" oninput="this.value = this.value.toUpperCase()">
        </div>
        <button class="btn-register" onclick="handleAction('register')">確認加入派下員名冊</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFid2ikrDBYtJlBZ-m96vV066fe1eSO-ZCJoHXyxyDcJzo_SApiyrpQLyviHw_hqI3wQ/exec";

    // 頁面切換邏輯
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'reg-active'));
        
        if(page === 'checkin') {
            document.getElementById('checkinPage').classList.add('active');
            document.getElementById('tab1').classList.add('active');
        } else {
            document.getElementById('registerPage').classList.add('active');
            document.getElementById('tab2').classList.add('reg-active');
        }
    }

    // 簽到歷史載入
    window.onload = () => {
        const last = localStorage.getItem('liao_name');
        if (last) document.getElementById('name').value = last;
        const history = JSON.parse(localStorage.getItem('liao_logs') || '[]');
        history.forEach(n => {
            const li = document.createElement('li');
            li.textContent = n;
            document.getElementById('recordList').appendChild(li);
        });
    };

    // 統一處理簽到與登記
    async function handleAction(type) {
        if (type === 'checkin') {
            const name = document.getElementById('name').value.trim();
            const id = document.getElementById('id').value.trim().toUpperCase();
            if (!name || id.length !== 10) return alert('請完整填寫姓名與身分證！');
            
            const time = new Date().toLocaleString('zh-TW', {hour12:false});
            const resp = await fetch(`${GAS_URL}?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}&time=${encodeURIComponent(time)}`);
            const result = await resp.text();

            if (result.includes("SUCCESS")) {
                alert('✅ 簽到成功！感念祖德。');
                localStorage.setItem('liao_name', name);
                saveLog(name);
                document.getElementById('id').value = "";
            } else {
                alert('❌ 驗證失敗：資料不符或尚未登記。');
            }
        } else {
            const name = document.getElementById('regName').value.trim();
            const id = document.getElementById('regID').value.trim().toUpperCase();
            if (!name || id.length !== 10) return alert('請確認姓名與身分證格式！');

            const formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('id', id);
            
            const resp = await fetch(GAS_URL, { method: 'POST', body: formData });
            const result = await resp.text();

            if (result.includes("REGISTER_SUCCESS")) {
                alert('🎉 登記成功！請切換到「本人簽到」頁面進行簽到。');
                showPage('checkin');
                document.getElementById('name').value = name;
            } else if (result.includes("ALREADY_EXISTS")) {
                alert('⚠️ 該身分證已登記過，不需重複辦理。');
            }
        }
    }

    function saveLog(name) {
        let history = JSON.parse(localStorage.getItem('liao_logs') || '[]');
        if(!history.includes(name)) history.unshift(name);
        localStorage.setItem('liao_logs', JSON.stringify(history.slice(0, 3)));
        location.reload();
    }
</script>

</body>
</html>
